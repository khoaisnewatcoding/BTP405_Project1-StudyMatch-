services:
  - type: web
    name: studymatch
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGODB_DB
        value: studymatch
      - key: STUDYMATCH_SECRET_KEY
        generateValue: true
